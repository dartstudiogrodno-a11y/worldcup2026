    const STATIC_MATCHES = generateStaticMatches();

    // --- CALCULATE STANDINGS & TOP 3rd PLACES ---
    function calculateStandings(matchesData) {
      const standings = {};
      const groupNames = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
      groupNames.forEach(g => { standings[g] = []; });

      const teamStats = {};
      Object.keys(TEAMS).forEach(code => {
        teamStats[code] = {
          ...TEAMS[code],
          played: 0, win: 0, draw: 0, loss: 0, gf: 0, ga: 0, gd: 0, pts: 0
        };
      });

      STATIC_MATCHES.forEach(m => {
        const pred = matchesData[m.id];
        if (pred && pred.home !== undefined && pred.away !== undefined && pred.home !== '' && pred.away !== '') {
          const hG = parseInt(pred.home);
          const aG = parseInt(pred.away);

          if (!isNaN(hG) && !isNaN(aG)) {
            teamStats[m.home].played++;
            teamStats[m.away].played++;
            teamStats[m.home].gf += hG;
            teamStats[m.home].ga += aG;
            teamStats[m.away].gf += aG;
            teamStats[m.away].ga += hG;

            if (hG > aG) {
              teamStats[m.home].win++;
              teamStats[m.home].pts += 3;
              teamStats[m.away].loss++;
            } else if (hG < aG) {
              teamStats[m.away].win++;
              teamStats[m.away].pts += 3;
              teamStats[m.home].loss++;
            } else {
              teamStats[m.home].draw++;
              teamStats[m.away].draw++;
              teamStats[m.home].pts += 1;
              teamStats[m.away].pts += 1;
            }
          }
        }
      });

      Object.keys(teamStats).forEach(code => {
        const team = teamStats[code];
        team.gd = team.gf - team.ga;
        standings[team.group].push(team);
      });

      // Sort each group
      Object.keys(standings).forEach(g => {
        standings[g].sort((a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          if (b.gd !== a.gd) return b.gd - a.gd;
          if (b.gf !== a.gf) return b.gf - a.gf;
          return a.name.localeCompare(b.name);
        });
      });

      // Extract 3rd placed teams and sort them
      const thirdPlaced = [];
      Object.keys(standings).forEach(g => {
        if (standings[g][2]) {
          thirdPlaced.push(standings[g][2]);
        }
      });

      thirdPlaced.sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.gd !== a.gd) return b.gd - a.gd;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.name.localeCompare(b.name);
      });

      // 8 best 3rd placed teams advance
      const best3rd = thirdPlaced.slice(0, 8);

      const advancing = [];
      Object.keys(standings).forEach(g => {
        advancing.push(standings[g][0].code); // 1st
        advancing.push(standings[g][1].code); // 2nd
      });
      best3rd.forEach(t => advancing.push(t.code));

      return {
        standings,
        thirdPlaced,
        best3rd: best3rd.map(t => t.code),
        advancing
      };
    }

    // Determine Knockout 1/16 pairings (Round of 32 matches)
    function getKnockoutPairings(standings, best3rdCodes) {
      const sorted3rd = [...best3rdCodes].sort(); 

      const getTeam = (group, pos) => standings[group]?.[pos] || { code: `?-${group}${pos+1}`, name: `${pos+1}-е место Гр. ${group}`, flag: '⚽' };
      const get3rd = (index) => {
        const code = sorted3rd[index];
        return TEAMS[code] || { code: `?_3rd_${index}`, name: `3-е место #${index+1}`, flag: '⚽' };
      };

      return {
        R32_1: [getTeam('A', 0), get3rd(0)],        
        R32_2: [getTeam('B', 1), getTeam('C', 1)], 
        R32_3: [getTeam('C', 0), get3rd(1)],        
        R32_4: [getTeam('D', 1), getTeam('E', 1)], 
        R32_5: [getTeam('E', 0), get3rd(2)],        
        R32_6: [getTeam('F', 1), getTeam('G', 1)], 
        R32_7: [getTeam('G', 0), get3rd(3)],        
        R32_8: [getTeam('H', 1), getTeam('I', 1)], 
        R32_9: [getTeam('I', 0), get3rd(4)],        
        R32_10: [getTeam('J', 1), getTeam('K', 1)], 
        R32_11: [getTeam('K', 0), get3rd(5)],        
        R32_12: [getTeam('L', 1), getTeam('A', 1)], 
        R32_13: [getTeam('B', 0), get3rd(6)],        
        R32_14: [getTeam('F', 0), getTeam('D', 0)], 
        R32_15: [getTeam('H', 0), getTeam('J', 0)], 
        R32_16: [getTeam('L', 0), get3rd(7)]         
      };
    }

    // Resolve the entire bracket (1/16 -> Champion)
    function resolveWholeBracket(matches, koChoices) {
      const { standings, best3rd, advancing } = calculateStandings(matches);
      const r32Matches = getKnockoutPairings(standings, best3rd);

      const getWinner = (matchId, t1, t2) => {
        if (!t1 || !t2 || t1.code.startsWith('?') || t2.code.startsWith('?')) return null;
        const choice = koChoices[matchId];
        if (choice === t1.code || choice === t2.code) return choice;
        return null; 
      };

      const getR32WinnerTeam = (r32Id, placeholderName) => {
        const pair = r32Matches[r32Id];
        if (!pair) return { code: `?_${r32Id}`, name: placeholderName, flag: '⚽' };
        const wCode = getWinner(r32Id, pair[0], pair[1]);
        return TEAMS[wCode] || { code: `?_${r32Id}`, name: placeholderName, flag: '⚽' };
      };

      const r16Matches = {
        R16_1: [getR32WinnerTeam('R32_1', 'Поб. 1/16 #1'), getR32WinnerTeam('R32_2', 'Поб. 1/16 #2')],
        R16_2: [getR32WinnerTeam('R32_3', 'Поб. 1/16 #3'), getR32WinnerTeam('R32_4', 'Поб. 1/16 #4')],
        R16_3: [getR32WinnerTeam('R32_5', 'Поб. 1/16 #5'), getR32WinnerTeam('R32_6', 'Поб. 1/16 #6')],
        R16_4: [getR32WinnerTeam('R32_7', 'Поб. 1/16 #7'), getR32WinnerTeam('R32_8', 'Поб. 1/16 #8')],
        R16_5: [getR32WinnerTeam('R32_9', 'Поб. 1/16 #9'), getR32WinnerTeam('R32_10', 'Поб. 1/16 #10')],
        R16_6: [getR32WinnerTeam('R32_11', 'Поб. 1/16 #11'), getR32WinnerTeam('R32_12', 'Поб. 1/16 #12')],
        R16_7: [getR32WinnerTeam('R32_13', 'Поб. 1/16 #13'), getR32WinnerTeam('R32_14', 'Поб. 1/16 #14')],
        R16_8: [getR32WinnerTeam('R32_15', 'Поб. 1/16 #15'), getR32WinnerTeam('R32_16', 'Поб. 1/16 #16')],
      };

      const getR16WinnerTeam = (r16Id, placeholderName) => {
        const pair = r16Matches[r16Id];
        if (!pair) return { code: `?_${r16Id}`, name: placeholderName, flag: '⚽' };
        const wCode = getWinner(r16Id, pair[0], pair[1]);
        return TEAMS[wCode] || { code: `?_${r16Id}`, name: placeholderName, flag: '⚽' };
      };

      const qfMatches = {

        const wCode = getWinner(qfId, pair[0], pair[1]);

      const finalPair = finalMatches.FINAL;

      const getCodes = (arr) => arr.filter(t => t && !t.code.startsWith('?')).map(t => t.code);

      return {
        advancing,

    // --- SCORING CALCULATION ENGINE ---
    function calculateUserScore(userPred, realResults) {
      let matchPoints = 0;
      let groupTeamsPoints = 0;
      let koPoints = 0;

      let score3 = 0; 
      let score2 = 0; 
      let score1 = 0; 

      const realMatches = realResults?.matches || {};
      const predMatches = userPred?.matches || {};

      // 1. Group stage match point calculations
      STATIC_MATCHES.forEach(m => {
        const real = realMatches[m.id];
        const pred = predMatches[m.id];

        if (real && real.home !== undefined && real.away !== undefined && real.home !== '' && real.away !== '') {
          if (pred && pred.home !== undefined && pred.away !== undefined && pred.home !== '' && pred.away !== '') {
            const rH = parseInt(real.home);
            const rA = parseInt(real.away);
            const pH = parseInt(pred.home);
            const pA = parseInt(pred.away);

            if (!isNaN(rH) && !isNaN(rA) && !isNaN(pH) && !isNaN(pA)) {
              if (pH === rH && pA === rA) {
                matchPoints += 3;
                score3++;
              } else {
                const rWin = rH > rA ? 1 : (rH < rA ? -1 : 0);
                const pWin = pH > pA ? 1 : (pH < pA ? -1 : 0);

                if (rWin === pWin) {
                  const rDiff = rH - rA;
                  const pDiff = pH - pA;
                  if (rDiff === pDiff) {
                    matchPoints += 2;
                    score2++;
                  } else {
                    matchPoints += 1;
                    score1++;
                  }
                }
              }
            }
          }
        }
      });

      // 2. Advancing group outcome & Knockouts ONLY calculated if group stage is fully completed
      const isGroupStageFinished = STATIC_MATCHES.every(m => {
        const real = realMatches[m.id];
        return real && real.home !== undefined && real.away !== undefined && real.home !== '' && real.away !== '';
      });

      let correctAdvancingCount = 0;
      let r16Points = 0;
      let qfPoints = 0;
      let sfPoints = 0;
      let fPoints = 0;
      let champPoints = 0;

      if (isGroupStageFinished) {
        const realStages = resolveWholeBracket(realMatches, realResults?.ko || {});
        const predStages = resolveWholeBracket(predMatches, userPred?.ko || {});

        // Clean dummy teams starting with '?' before awarding points
        const cleanRealR32 = (realStages.r32 || []).filter(code => code && !code.startsWith('?'));
        const cleanRealR16 = (realStages.r16 || []).filter(code => code && !code.startsWith('?'));
        const cleanRealQf = (realStages.qf || []).filter(code => code && !code.startsWith('?'));
        const cleanRealSf = (realStages.sf || []).filter(code => code && !code.startsWith('?'));
        const cleanRealF = (realStages.f || []).filter(code => code && !code.startsWith('?'));
        const cleanRealChamp = (realStages.champion && !realStages.champion.startsWith('?')) ? realStages.champion : null;

        if (cleanRealR32.length > 0) {
          predStages.r32.forEach(code => {
            if (cleanRealR32.includes(code)) {
              groupTeamsPoints += 5;
              correctAdvancingCount++;
            }
          });
        }

        if (cleanRealR16.length > 0) {
          predStages.r16.forEach(code => {
            if (cleanRealR16.includes(code)) r16Points += 7;
          });
        }

        if (cleanRealQf.length > 0) {
          predStages.qf.forEach(code => {
            if (cleanRealQf.includes(code)) qfPoints += 8;
          });
        }

        if (cleanRealSf.length > 0) {
          predStages.sf.forEach(code => {
            if (cleanRealSf.includes(code)) sfPoints += 9;
          });
        }

        if (cleanRealF.length > 0) {
          predStages.f.forEach(code => {
            if (cleanRealF.includes(code)) fPoints += 10;
          });
        }

        if (cleanRealChamp && predStages.champion === cleanRealChamp) {
          champPoints = 13;
        }
      }

      koPoints = r16Points + qfPoints + sfPoints + fPoints + champPoints;
      const totalPoints = matchPoints + groupTeamsPoints + koPoints;

      return {
        totalPoints,
        matchPoints,
        groupTeamsPoints,
        koPoints,
        breakdown: {
          score3, score2, score1,
          correctAdvancingCount,
          r16Points, qfPoints, sfPoints, fPoints, champPoints
        }
      };
    }

                      ПАНЕЛЬ АДМИНИСТРАТОРА (РЕАЛЬНЫЕ РЕЗУЛЬТАТЫ)
                    </h3>
                    <p class="text-xs text-slate-400 mt-1">
                      Здесь вводятся фактические счета сыгранных матчей. На основе введенных счетов группы <span class="text-emerald-400 font-bold">автоматически</span> строится реальная сетка плей-офф.
                    </p>
                  </div>
                  
                  <button 
                    onClick={handleAdminAutoFill}
                    class="bg-red-500/20 hover:bg-red-500/40 text-red-200 border border-red-500/30 px-3.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1.5 transition"
                  >
                    <i class="fa-solid fa-bolt"></i>
                    <span>⚡ Заполнить реальные группы (Тест)</span>
                  </button>
                </div>

                <div class="flex flex-wrap gap-1">
                  {['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'].map(g => (
                    <button key={g} onClick={() => setAdminGroupTab(g)} class={`w-8 h-8 text-xs font-bold rounded-lg transition ${adminGroupTab === g ? 'bg-red-500 text-white font-black' : 'bg-slate-800 text-slate-300 hover:text-white'}`}>
                      {g}
                    </button>
                  ))}
                  <div class="w-[1px] h-8 bg-slate-850 mx-1"></div>
                  <button onClick={() => setAdminGroupTab('ko')} class={`px-3 py-1.5 text-xs font-bold rounded-lg transition ${adminGroupTab === 'ko' ? 'bg-red-500 text-white shadow-md' : 'bg-slate-800 text-slate-300 hover:text-white'}`}>
                    Сетка плей-офф (Факт)
                  </button>
                </div>

                {['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'].includes(adminGroupTab) && (
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {STATIC_MATCHES.filter(m => m.group === adminGroupTab).map(match => {
                      const real = realResults.matches?.[match.id] || { home: '', away: '' };
                      return (
                        <div key={match.id} class="flex flex-col p-3 bg-slate-950 rounded-xl border border-slate-800 gap-2">
                          <div class="text-[9px] text-slate-500 font-bold uppercase text-center bg-slate-900 py-0.5 rounded border border-slate-850">
                            {match.date} &bull; {match.time} &bull; {match.city}
                          </div>
                          <div class="flex items-center justify-between mt-1">
                            <span class="text-xs font-semibold w-1/3 text-right truncate">{TEAMS[match.home].name}</span>
                            <div class="flex items-center gap-1">
                              <input
                                type="number"
                                placeholder="-"
                                value={real.home}
                                onChange={(e) => handleRealScoreChange(match.id, 'home', e.target.value)}
                                class="w-10 h-8 bg-slate-900 border border-slate-800 focus:border-red-500 text-center font-bold rounded focus:outline-none"
                              />
                              <span class="text-slate-600">:</span>
                              <input
                                type="number"
                                placeholder="-"
                                value={real.away}
                                onChange={(e) => handleRealScoreChange(match.id, 'away', e.target.value)}
                                class="w-10 h-8 bg-slate-900 border border-slate-800 focus:border-red-500 text-center font-bold rounded focus:outline-none"
                              />
                            </div>
                            <span class="text-xs font-semibold w-1/3 text-left truncate">{TEAMS[match.away].name}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {adminGroupTab === 'ko' && (
                  <div class="space-y-4">
                    <div class="flex flex-wrap gap-1 bg-slate-950 p-1.5 rounded-xl border border-slate-850">
                      {[
                        { key: 'R32', label: '1/16 финала' },
                        { key: 'R16', label: '1/8 финала' },
                        { key: 'QF', label: '1/4 финала' },
                        { key: 'SF', label: 'Полуфиналы' },
                        { key: 'F', label: 'Финал' }
                      ].map(st => (
                        <button key={st.key} onClick={() => setAdminKoStageTab(st.key)} class={`flex-1 py-1.5 text-xs font-bold rounded ${adminKoStageTab === st.key ? 'bg-red-500 text-white' : 'text-slate-400'}`}>
                          {st.label}
                        </button>
                      ))}
                    </div>

                    <div class="p-4 bg-slate-950 rounded-xl border border-slate-800 space-y-4">
                      
                      {/* ADMIN R32 VIEW */}
                      {adminKoStageTab === 'R32' && (
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                          {Object.keys(realCalculatedBracket.r32Matches).map((matchId, idx) => {
                            const [t1, t2] = realCalculatedBracket.r32Matches[matchId];
                            const selected = realResults.ko?.[matchId];

                            return (
                              <div key={matchId} class="bg-slate-900 p-3 rounded-xl border border-slate-800 space-y-2">
                                <span class="text-[10px] text-red-400 font-extrabold uppercase">Пара #{idx+1} (1/16)</span>
                                <div class="space-y-1.5">
                                  <button onClick={() => handleRealKnockoutAdvance(matchId, t1.code)} class={`w-full flex justify-between p-2 rounded text-xs font-semibold ${selected === t1.code ? 'bg-red-500 text-white' : 'bg-slate-950 text-slate-300 border border-slate-805'}`}>
                                    <span>{t1.flag} {t1.name}</span>
                                    {selected === t1.code && <i class="fa-solid fa-check"></i>}
                                  </button>
                                  <button onClick={() => handleRealKnockoutAdvance(matchId, t2.code)} class={`w-full flex justify-between p-2 rounded text-xs font-semibold ${selected === t2.code ? 'bg-red-500 text-white' : 'bg-slate-950 text-slate-300 border border-slate-805'}`}>
                                    <span>{t2.flag} {t2.name}</span>
                                    {selected === t2.code && <i class="fa-solid fa-check"></i>}
                                  </button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {/* ADMIN R16 VIEW */}
                      {adminKoStageTab === 'R16' && (
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                          {Object.keys(realCalculatedBracket.r16Matches).map((matchId, idx) => {
                            const [t1, t2] = realCalculatedBracket.r16Matches[matchId];
                            const selected = realResults.ko?.[matchId];

                            return (
                              <div key={matchId} class="bg-slate-900 p-3 rounded-xl border border-slate-800 space-y-2">
                                <span class="text-[10px] text-red-400 font-extrabold uppercase">Пара #{idx+1} (1/8)</span>
                                <div class="space-y-1.5">
                                  <button onClick={() => handleRealKnockoutAdvance(matchId, t1.code)} class={`w-full flex justify-between p-2 rounded text-xs font-semibold ${selected === t1.code ? 'bg-red-500 text-white' : 'bg-slate-950 text-slate-300 border border-slate-805'}`}>
                                    <span>{t1.flag} {t1.name}</span>
                                    {selected === t1.code && <i class="fa-solid fa-check"></i>}
                                  </button>
                                  <button onClick={() => handleRealKnockoutAdvance(matchId, t2.code)} class={`w-full flex justify-between p-2 rounded text-xs font-semibold ${selected === t2.code ? 'bg-red-500 text-white' : 'bg-slate-950 text-slate-300 border border-slate-805'}`}>
                                    <span>{t2.flag} {t2.name}</span>
                                    {selected === t2.code && <i class="fa-solid fa-check"></i>}
                                  </button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {/* ADMIN QF VIEW */}
                      {adminKoStageTab === 'QF' && (
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {Object.keys(realCalculatedBracket.qfMatches).map((matchId, idx) => {
                            const [t1, t2] = realCalculatedBracket.qfMatches[matchId];
                            const selected = realResults.ko?.[matchId];

                            return (
                              <div key={matchId} class="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
                                <span class="text-[10px] text-red-400 font-extrabold uppercase">Четвертьфинал {idx+1}</span>
                                <div class="space-y-2">
                                  <button onClick={() => handleRealKnockoutAdvance(matchId, t1.code)} class={`w-full flex justify-between p-2 rounded text-xs font-semibold ${selected === t1.code ? 'bg-red-500 text-white' : 'bg-slate-950 text-slate-300 border border-slate-800'}`}>
                                    <span>{t1 ? `${t1.flag} ${t1.name}` : 'Пусто'}</span>
                                    {selected === t1?.code && <i class="fa-solid fa-check"></i>}
                                  </button>
                                  <button onClick={() => handleRealKnockoutAdvance(matchId, t2.code)} class={`w-full flex justify-between p-2 rounded text-xs font-semibold ${selected === t2.code ? 'bg-red-500 text-white' : 'bg-slate-950 text-slate-300 border border-slate-800'}`}>
                                    <span>{t2 ? `${t2.flag} ${t2.name}` : 'Пусто'}</span>
                                    {selected === t2?.code && <i class="fa-solid fa-check"></i>}
                                  </button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {/* ADMIN SF VIEW */}
                      {adminKoStageTab === 'SF' && (
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {Object.keys(realCalculatedBracket.sfMatches).map((matchId, idx) => {
                            const [t1, t2] = realCalculatedBracket.sfMatches[matchId];
                            const selected = realResults.ko?.[matchId];

                            return (
                              <div key={matchId} class="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
                                <span class="text-[10px] text-red-400 font-extrabold uppercase">Полуфинал {idx+1}</span>
                                <div class="space-y-2">
                                  <button onClick={() => handleRealKnockoutAdvance(matchId, t1.code)} class={`w-full flex justify-between p-2 rounded text-xs font-semibold ${selected === t1.code ? 'bg-red-500 text-white' : 'bg-slate-950 text-slate-300 border border-slate-800'}`}>
                                    <span>{t1 ? `${t1.flag} ${t1.name}` : 'Пусто'}</span>
                                    {selected === t1?.code && <i class="fa-solid fa-check"></i>}
                                  </button>
                                  <button onClick={() => handleRealKnockoutAdvance(matchId, t2.code)} class={`w-full flex justify-between p-2 rounded text-xs font-semibold ${selected === t2.code ? 'bg-red-500 text-white' : 'bg-slate-950 text-slate-300 border border-slate-800'}`}>
                                    <span>{t2 ? `${t2.flag} ${t2.name}` : 'Пусто'}</span>
                                    {selected === t2?.code && <i class="fa-solid fa-check"></i>}
                                  </button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {/* ADMIN F VIEW */}
                      {adminKoStageTab === 'F' && (
                        <div class="max-w-md mx-auto bg-slate-900 p-5 rounded-xl border border-slate-800 space-y-4">
                          <span class="text-xs text-red-400 font-extrabold uppercase text-center block">Финал</span>
                          {Object.keys(realCalculatedBracket.finalMatches).map((matchId) => {
                            const [t1, t2] = realCalculatedBracket.finalMatches[matchId];
                            const selected = realResults.ko?.[matchId];

                            return (
                              <div key={matchId} class="space-y-3">
                                <button onClick={() => handleRealKnockoutAdvance(matchId, t1.code)} class={`w-full flex justify-between p-2.5 rounded text-xs font-semibold ${selected === t1.code ? 'bg-red-500 text-white font-black' : 'bg-slate-950 text-slate-300 border border-slate-800'}`}>
                                  <span>{t1 ? `${t1.flag} ${t1.name}` : 'Пусто'}</span>
                                  {selected === t1?.code && <i class="fa-solid fa-crown"></i>}
                                </button>
                                <div class="text-center text-[10px] text-slate-500 font-bold">ФАКТИЧЕСКИЙ ЧЕМПИОН ЧМ:</div>
                                <button onClick={() => handleRealKnockoutAdvance(matchId, t2.code)} class={`w-full flex justify-between p-2.5 rounded text-xs font-semibold ${selected === t2.code ? 'bg-red-500 text-white font-black' : 'bg-slate-950 text-slate-300 border border-slate-800'}`}>
                                  <span>{t2 ? `${t2.flag} ${t2.name}` : 'Пусто'}</span>
                                  {selected === t2?.code && <i class="fa-solid fa-crown"></i>}
                                </button>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                )}

              </div>
            )}

          </main>

          {/* DETAILED PLAYER PROGNOSIS MODAL */}
          {selectedPlayerDetails && (
            <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
              <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-4xl max-h-[85vh] flex flex-col shadow-2xl text-xs">
                
                {/* Header */}
                <div class="p-5 border-b border-slate-800 flex items-center justify-between">
                  <div>
                    <h3 class="text-lg font-extrabold text-emerald-400">Прогнозы игрока: {selectedPlayerDetails.username}</h3>
                    <p class="text-xs text-slate-400 mt-1 font-semibold">Итого набранных очков: <span class="font-bold text-yellow-400 text-sm">{selectedPlayerDetails.scoreObj.totalPoints}</span></p>
                  </div>
                  <button 
                    onClick={() => setSelectedPlayerDetailId(null)}
                    class="text-slate-400 hover:text-slate-100 p-1 bg-slate-800 hover:bg-slate-750 rounded-lg transition"
                  >
                    <i class="fa-solid fa-xmark text-lg"></i>
                  </button>
                </div>

                {/* Content */}
                <div class="p-5 overflow-y-auto space-y-6 flex-grow">
                  
                  {/* Groups stats breakdown */}
                  <h4 class="font-extrabold text-sm text-emerald-400 border-b border-slate-800 pb-2">Продвижение из групп (Прогноз игрока)</h4>
                  <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                    {['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'].map(g => {
                      const topTeams = selectedPlayerDetails.standings.standings[g].slice(0, 3);
                      return (
                        <div key={g} class="bg-slate-950 p-2.5 rounded-xl border border-slate-850 space-y-1">
                          <h4 class="font-bold text-slate-300 text-[10px]">Группа {g}</h4>
                          <div class="space-y-1 text-[10px]">
                            {topTeams.map((team, idx) => {
                              const isAdv = idx < 2 || selectedPlayerDetails.standings.best3rd.includes(team.code);
                              return (
                                <div key={team.code} class="flex items-center justify-between">
                                  <span class="text-slate-400 truncate max-w-[70px]">{idx+1}. {team.flag} {team.name}</span>
                                  <span class={`font-bold text-[9px] px-1 rounded ${isAdv ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-500'}`}>
                                    {isAdv ? '1/16' : 'Вылет'}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Bracket detail */}
                  <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-4">
                    <h4 class="font-extrabold text-sm text-yellow-400 border-b border-slate-800 pb-2">Сетка плей-офф прогнозиста</h4>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                      
                      <div class="space-y-1 bg-slate-900/60 p-2.5 rounded border border-slate-850">
                        <span class="text-[9px] text-slate-400 uppercase font-bold">Вышли в 1/8</span>
                        <div class="space-y-1 font-semibold text-slate-300 max-h-36 overflow-y-auto">
                          {selectedPlayerDetails.bracket.r16.length > 0 ? (
                            selectedPlayerDetails.bracket.r16.map(code => <div key={code} class="truncate">{renderTeamName(code)}</div>)
                          ) : (
                            <span class="text-slate-600">Пусто</span>
                          )}
                        </div>
                      </div>

                      <div class="space-y-1 bg-slate-900/60 p-2.5 rounded border border-slate-850">
                        <span class="text-[9px] text-slate-400 uppercase font-bold">Вышли в 1/4</span>
                        <div class="space-y-1 font-semibold text-slate-300 max-h-36 overflow-y-auto">
                          {selectedPlayerDetails.bracket.qf.length > 0 ? (
                            selectedPlayerDetails.bracket.qf.map(code => <div key={code} class="truncate">{renderTeamName(code)}</div>)
                          ) : (
                            <span class="text-slate-600">Пусто</span>
                          )}
                        </div>
                      </div>

                      <div class="space-y-1 bg-slate-900/60 p-2.5 rounded border border-slate-850">
                        <span class="text-[9px] text-slate-400 uppercase font-bold">Вышли в 1/2</span>
                        <div class="space-y-1 font-semibold text-slate-300 max-h-36 overflow-y-auto">
                          {selectedPlayerDetails.bracket.sf.length > 0 ? (
                            selectedPlayerDetails.bracket.sf.map(code => <div key={code} class="truncate">{renderTeamName(code)}</div>)
                          ) : (
                            <span class="text-slate-600">Пусто</span>
                          )}
                        </div>
                      </div>

                      <div class="space-y-1 bg-slate-900/60 p-2.5 rounded border border-slate-850">
                        <span class="text-[9px] text-slate-400 uppercase font-bold">Финалисты</span>
                        <div class="space-y-1 font-semibold text-slate-300 max-h-36 overflow-y-auto">
                          {selectedPlayerDetails.bracket.f.length > 0 ? (
                            selectedPlayerDetails.bracket.f.map(code => <div key={code} class="truncate">{renderTeamName(code)}</div>)
                          ) : (
                            <span class="text-slate-600">Пусто</span>
                          )}
                        </div>
                      </div>

                      <div class="space-y-1 bg-yellow-500/5 p-2.5 rounded border border-yellow-500/20">
                        <span class="text-[9px] text-yellow-400 uppercase font-bold">Победитель</span>
                        <div class="font-extrabold text-yellow-300 mt-1">
                          {selectedPlayerDetails.bracket.champion ? (
                            renderTeamName(selectedPlayerDetails.bracket.champion)
                          ) : (
                            <span class="text-slate-600">Пусто</span>
                          )}
                        </div>
                      </div>

                    </div>
                  </div>

                </div>

                {/* Footer */}
                <div class="p-4 border-t border-slate-800 bg-slate-950/40 rounded-b-2xl text-right font-bold">
                  <button 
                    onClick={() => setSelectedPlayerDetailId(null)}
                    class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 px-4 py-2 rounded-xl text-xs transition"
                  >
                    Закрыть
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* CONFIRM MODAL FOR SUBMIT */}
          {showSubmitConfirm && (
            <div class="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in">
              <div class="bg-slate-900 border-2 border-amber-500/30 rounded-2xl w-full max-w-md p-6 space-y-4 shadow-2xl text-center">
                <div class="text-amber-400 text-4xl">
                  <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 class="text-lg font-extrabold text-slate-100 uppercase">Подтверждение фиксации</h3>
                <p class="text-xs text-slate-400 px-2 leading-relaxed">
                  {submitWarningMsg}
                </p>
                <div class="flex gap-3 pt-2">
                  <button 
                    onClick={() => setShowSubmitConfirm(false)}
                    class="flex-1 bg-slate-800 hover:bg-slate-750 text-slate-300 font-bold py-2.5 rounded-xl text-xs transition"
                  >
                    Отмена
                  </button>
                  <button 
                    onClick={confirmSubmitLock}
                    class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-950 font-black py-2.5 rounded-xl text-xs transition shadow-lg shadow-amber-500/10"
                  >
                    Да, заблокировать!
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ADMIN PASSWORD MODAL */}
          {showAdminPasswordModal && (
            <div class="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in">
              <div class="bg-slate-900 border-2 border-red-500/30 rounded-2xl w-full max-w-sm p-6 space-y-4 shadow-2xl text-center">
                <div class="text-red-400 text-4xl">
                  <i class="fa-solid fa-lock"></i>
                </div>
                <h3 class="text-lg font-extrabold text-slate-100 uppercase">Вход в режим админа</h3>
                <p class="text-xs text-slate-400 px-2">
                  Для изменения официальных результатов введите секретный пароль администратора.
                </p>
                
                <div class="space-y-3">
                  <input 
                    type="password" 
                    value={adminPasswordInput}
                    onChange={(e) => {
                      setAdminPasswordInput(e.target.value);
                      if (adminPasswordError) setAdminPasswordError('');
                    }}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') {
                        handleAdminPasswordSubmit();
                      }
                    }}
                    class="w-full bg-slate-950 border border-slate-850 text-slate-100 px-4 py-2.5 rounded-xl text-center text-sm font-semibold focus:outline-none focus:border-red-500 transition-colors"
                    placeholder="Введите пароль"
                    autoFocus
                  />
                  {adminPasswordError && (
                    <p class="text-xs text-red-500 font-semibold animate-pulse">{adminPasswordError}</p>
                  )}
                </div>

                <div class="flex gap-3 pt-2">
                  <button 
                    onClick={() => setShowAdminPasswordModal(false)}
                    class="flex-1 bg-slate-800 hover:bg-slate-750 text-slate-300 font-bold py-2 rounded-xl text-xs transition"
                  >
                    Отмена
                  </button>
                  <button 
                    onClick={handleAdminPasswordSubmit}
                    class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-xl text-xs transition shadow-lg shadow-red-500/10"
                  >
                    Войти
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* FOOTER */}
          <footer class="bg-slate-950 border-t border-slate-900 text-center py-6 px-4 mt-auto">
            <p class="text-xs text-slate-500">⚽ Предиктор Чемпионата Мира. Все права на турниры принадлежат FIFA.</p>
            <p class="text-[10px] text-slate-600 mt-1">Создано с использованием React, Tailwind CSS & Firebase Cloud Sync</p>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
